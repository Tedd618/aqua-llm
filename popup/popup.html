<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aqua LLM</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- ── Bowl / Tank (centered on white) ─────────────────── -->
    <div class="tank-container" id="tankContainer">
      <svg id="bowlSvg" class="bowl-svg" viewBox="0 0 300 340">
        <defs>
          <!-- Water gradient — dark charcoal, matches pixel art outline colour -->
          <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
            <stop id="waterTop" offset="0%" stop-color="#4a4a4a" stop-opacity="1" />
            <stop id="waterMid" offset="50%" stop-color="#383838" stop-opacity="1" />
            <stop id="waterBot" offset="100%" stop-color="#282828" stop-opacity="1" />
          </linearGradient>

          <!-- Light ray gradient — faint white streaks in dark water -->
          <linearGradient id="lightRay" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
          </linearGradient>
        </defs>

        <g id="tankContents">
          <!-- Water fill (rect, position controlled by JS) -->
          <rect id="waterFill" x="0" y="160" width="300" height="200" fill="url(#waterGrad)" />

          <!-- Light rays -->
          <g id="lightRays" opacity="0.6">
            <polygon points="100,100 112,340 88,340" fill="url(#lightRay)" />
            <polygon points="170,100 185,340 158,340" fill="url(#lightRay)" />
            <polygon points="230,100 245,340 218,340" fill="url(#lightRay)" />
          </g>

          <!-- Decorations (populated by renderer) -->
          <g id="decorations"></g>

          <!-- Fish (populated by renderer) -->
          <g id="fishGroup"></g>

          <!-- Bubbles (populated by renderer) -->
          <g id="bubbles"></g>
        </g>
      </svg>

      <!-- Container image overlay — changes per tier, sits on top via multiply blend -->
      <img id="containerImg" class="container-img" src="../assets/tanks/round_fish_tank.png" alt="tank">

      <!-- Water label on hover -->
      <div class="water-label" id="waterLabel">
        <span class="water-current" id="waterCurrent">0 mL</span>
        <span class="water-sep">/</span>
        <span class="water-target" id="waterTarget">500 mL</span>
      </div>
    </div>

    <!-- Overlay buttons -->
    <button class="btn-overlay btn-menu" id="btnMenu" aria-label="Achievements">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect y="2.5" width="18" height="1.8" rx="0.9" fill="currentColor"/>
        <rect y="8.1" width="18" height="1.8" rx="0.9" fill="currentColor"/>
        <rect y="13.7" width="18" height="1.8" rx="0.9" fill="currentColor"/>
      </svg>
    </button>
    <button class="btn-overlay btn-fish" id="btnFish" aria-label="Collection">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M2 12 Q7 6 14 12 Q7 18 2 12Z" fill="currentColor" opacity="0.9"/>
        <polygon points="14,12 19,7 19,17" fill="currentColor" opacity="0.7"/>
        <circle cx="6" cy="11" r="1.2" fill="white"/>
      </svg>
    </button>

    <!-- ── Achievement overlay (Alto style: full blur + centered text) ── -->
    <div class="overlay overlay-achievements" id="overlayAchievements">
      <div class="overlay-content" id="achievementContent">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ── Collection overlay ──────────────────────────────── -->
    <div class="overlay overlay-collection" id="overlayCollection">
      <div class="overlay-collection-inner">
        <div class="collection-tabs">
          <button class="tab active" data-tab="fish">Fish</button>
          <button class="tab" data-tab="tanks">Tanks</button>
        </div>
        <div class="collection-grid" id="collectionGrid"></div>
      </div>
    </div>

  </div>

  <script src="../lib/tank-config.js"></script>
  <script src="tank-renderer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
