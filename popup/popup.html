<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aqua LLM</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- ── 3D Bowl (replaces SVG) ────────────────────────────── -->
    <div class="tank-container" id="tankContainer">
      <canvas id="bowlCanvas" width="380" height="440"></canvas>

      <!-- Water label on hover -->
      <div class="water-label" id="waterLabel">
        <span class="water-current" id="waterCurrent">0 mL</span>
        <span class="water-sep">/</span>
        <span class="water-target" id="waterTarget">500 mL</span>
      </div>
    </div>

    <!-- Overlay buttons -->
    <button class="btn-overlay btn-menu" id="btnMenu" aria-label="Achievements">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect y="2.5" width="18" height="1.8" rx="0.9" fill="currentColor"/>
        <rect y="8.1" width="18" height="1.8" rx="0.9" fill="currentColor"/>
        <rect y="13.7" width="18" height="1.8" rx="0.9" fill="currentColor"/>
      </svg>
    </button>
    <button class="btn-overlay btn-fish" id="btnFish" aria-label="Collection">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M2 12 Q7 6 14 12 Q7 18 2 12Z" fill="currentColor" opacity="0.9"/>
        <polygon points="14,12 19,7 19,17" fill="currentColor" opacity="0.7"/>
        <circle cx="6" cy="11" r="1.2" fill="white"/>
      </svg>
    </button>

    <!-- ── Achievement overlay ──────────────────────────────── -->
    <div class="overlay overlay-achievements" id="overlayAchievements">
      <div class="overlay-content" id="achievementContent">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ── Collection overlay (Fish only) ───────────────────── -->
    <div class="overlay overlay-collection" id="overlayCollection">
      <div class="overlay-collection-inner">
        <div class="collection-grid grid-fish" id="collectionGrid"></div>
      </div>
    </div>

  </div>

  <script src="../lib/tank-config.js"></script>
  <script type="module">
    import * as THREE from '../lib/three/three.module.js';
    // Make THREE available to bowl-3d.js (classic script)
    window.__THREE__ = THREE;
  </script>
  <script src="bowl-3d.js"></script>
  <script src="popup.js"></script>
</body>
</html>
