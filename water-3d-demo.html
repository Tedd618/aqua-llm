<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Fish Bowl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #edf2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE        from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ─────────────────────────────────────────────────
const W = 380, H = 440;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.localClippingEnabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ── Scene / Camera ───────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xedf2f5); // very light blue-grey — glass edge pops

const camera = new THREE.PerspectiveCamera(38, W / H, 0.01, 100);
camera.position.set(0, 0.2, 6.5);
camera.lookAt(0, -0.3, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0);
controls.minDistance = 3;
controls.maxDistance = 12;

// ── Lights — soft, diffuse, like window light ─────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.4));

const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(3, 5, 4);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 0.1;
key.shadow.camera.far  = 20;
scene.add(key);

const soft = new THREE.DirectionalLight(0xd0e8ff, 0.5);
soft.position.set(-3, 2, -2);
scene.add(soft);

// ── Bowl params ───────────────────────────────────────────────
const R        = 1.5;
const FILL     = 0.62;                            // ~60% full like reference
const waterY   = -R + 2 * R * FILL;              // ≈ 0.36
const surfR    = Math.sqrt(R*R - waterY*waterY);  // water surface circle radius
const bowlTopY = R * 0.78;                        // bowl opening height (~78% up)
const rimR     = Math.sqrt(R*R - bowlTopY*bowlTopY); // rim circle radius

// Clip planes
const waterClip   = new THREE.Plane(new THREE.Vector3(0, -1, 0), waterY);
const bowlTopClip = new THREE.Plane(new THREE.Vector3(0, -1, 0), bowlTopY);

// ── Glass material (very pale, nearly invisible) ──────────────
const makeGlass = (side) => {
  const m = new THREE.MeshPhysicalMaterial({
    color:              0xd8eeff,     // very pale blue tint — makes glass edge visible
    transmission:       0.90,
    ior:                1.50,
    thickness:          0.14,
    roughness:          0.02,
    metalness:          0.0,
    clearcoat:          0.9,
    clearcoatRoughness: 0.05,
    attenuationColor:   new THREE.Color(0x90b8e0),
    attenuationDistance:1.2,
    envMapIntensity:    0.0,
    clippingPlanes:     [bowlTopClip],
    side,
    depthWrite: false,
  });
  if (side === THREE.FrontSide) {
    m.onBeforeCompile = sh => {
      sh.fragmentShader = sh.fragmentShader.replace(
        '#include <output_fragment>',
        `float rim = pow(1.0 - abs(dot(normalize(vNormal), normalize(vViewPosition))), 5.0);
         outgoingLight += vec3(0.55, 0.72, 0.92) * rim * 0.65;
         #include <output_fragment>`
      );
    };
  }
  return m;
};

const shellGeo = new THREE.SphereGeometry(R, 80, 80);
const outer = new THREE.Mesh(shellGeo, makeGlass(THREE.FrontSide));
const inner = new THREE.Mesh(shellGeo, makeGlass(THREE.BackSide));
inner.scale.setScalar(0.978);
inner.renderOrder = -1;
scene.add(outer, inner);

// ── Glass rim (top opening ring) ──────────────────────────────
const rimTube = new THREE.TorusGeometry(rimR, 0.038, 20, 96);
const rimMat = new THREE.MeshPhysicalMaterial({
  color:       0xddeeff,
  transmission:0.85,
  ior:         1.50,
  thickness:   0.06,
  roughness:   0.02,
  clearcoat:   1.0,
  clearcoatRoughness: 0.04,
  envMapIntensity: 0.0,
});
const rimMesh = new THREE.Mesh(rimTube, rimMat);
rimMesh.rotation.x = Math.PI / 2;
rimMesh.position.y = bowlTopY;
scene.add(rimMesh);

// ── Water body ────────────────────────────────────────────────
// Very pale blue, high transparency — matches reference
const waterBodyMat = new THREE.MeshPhysicalMaterial({
  color:          0xb8dcf8,
  transparent:    true,
  opacity:        0.55,
  roughness:      0.1,
  clippingPlanes: [waterClip, bowlTopClip],
  side: THREE.FrontSide,
  depthWrite: false,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R * 0.972, 80, 80), waterBodyMat));

// ── Water surface shader ──────────────────────────────────────
const waterNormalTex = new THREE.TextureLoader().load(
  'https://threejs.org/examples/textures/waternormals.jpg',
  t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; }
);

const waterVert = /* glsl */`
  uniform float time;
  varying vec2  vUv;
  varying vec3  vWorldPos;
  varying vec3  vViewDir;
  varying vec3  vNormal;

  #define PI 3.14159265

  vec3 gerstner(vec3 pos, vec2 dir, float A, float Q, float L, float spd,
                inout vec3 T, inout vec3 B) {
    float k = 2.0 * PI / L;
    float c = sqrt(9.8 / k) * spd;
    vec2  d = normalize(dir);
    float f = k * (dot(d, pos.xz) - c * time);
    float s = sin(f), cs = cos(f);
    float qi = Q / (k * A);
    T += vec3(-qi*d.x*d.x*k*A*s,  qi*d.x*k*A*cs, -qi*d.x*d.y*k*A*s);
    B += vec3(-qi*d.x*d.y*k*A*s,  qi*d.y*k*A*cs, -qi*d.y*d.y*k*A*s);
    return vec3(qi*A*d.x*cs, A*s, qi*A*d.y*cs);
  }

  void main() {
    vUv = uv;
    vec3 pos = position;
    vec3 T = vec3(1,0,0), B = vec3(0,0,1);
    pos += gerstner(position, vec2( 1.00,  0.20), 0.005, 0.15, 0.42, 0.75, T, B);
    pos += gerstner(position, vec2( 0.48,  0.88), 0.003, 0.13, 0.30, 1.05, T, B);
    pos += gerstner(position, vec2(-0.70,  0.71), 0.003, 0.12, 0.24, 0.90, T, B);
    pos += gerstner(position, vec2(-0.92, -0.38), 0.002, 0.10, 0.20, 1.20, T, B);
    pos += gerstner(position, vec2( 0.20, -0.98), 0.002, 0.10, 0.16, 1.10, T, B);
    pos += gerstner(position, vec2( 0.64,  0.77), 0.001, 0.08, 0.13, 1.40, T, B);
    vNormal   = normalize(cross(B, T));
    vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
    vViewDir  = normalize(cameraPosition - vWorldPos);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

const waterFrag = /* glsl */`
  uniform sampler2D normalMap;
  uniform float     time;
  uniform vec3      sunDir;
  varying vec2      vUv;
  varying vec3      vWorldPos;
  varying vec3      vViewDir;
  varying vec3      vNormal;

  void main() {
    vec2 uv1 = vUv * 4.5 + vec2( time * 0.018, time * 0.011);
    vec2 uv2 = vUv * 4.5 + vec2(-time * 0.013, time * 0.021);
    vec3 n1 = texture2D(normalMap, uv1).rgb * 2.0 - 1.0;
    vec3 n2 = texture2D(normalMap, uv2).rgb * 2.0 - 1.0;
    vec3 N  = normalize(vNormal + normalize(vec3(n1.xy + n2.xy, n1.z)) * 0.10);
    vec3 V  = normalize(vViewDir);

    // Fresnel
    float F0 = 0.02;
    float fresnel = F0 + (1.0-F0) * pow(1.0 - max(dot(V, N), 0.0), 5.0);

    // Very soft specular — matches reference (no harsh highlights)
    vec3  H    = normalize(V + normalize(sunDir));
    float spec = pow(max(dot(N, H), 0.0), 80.0) * 0.5;

    // Pale blue — almost white with a hint of blue like reference
    vec3 waterCol = vec3(0.68, 0.86, 0.98);
    vec3 skyRefl  = vec3(0.85, 0.93, 1.00);
    vec3 color    = mix(waterCol, skyRefl, fresnel * 0.6) + vec3(1.0) * spec;

    gl_FragColor = vec4(color, 0.72);
  }
`;

const surfGeo = new THREE.CircleGeometry(surfR * 0.988, 128);
surfGeo.rotateX(-Math.PI / 2);

const waterSurface = new THREE.Mesh(surfGeo, new THREE.ShaderMaterial({
  vertexShader:   waterVert,
  fragmentShader: waterFrag,
  uniforms: {
    time:      { value: 0 },
    normalMap: { value: waterNormalTex },
    sunDir:    { value: new THREE.Vector3(3, 5, 4).normalize() },
  },
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
}));
waterSurface.position.y = waterY;
scene.add(waterSurface);


// ── Base shadow ───────────────────────────────────────────────
const shadow = new THREE.Mesh(
  new THREE.CircleGeometry(1.1, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.06, side: THREE.DoubleSide })
);
shadow.rotation.x = -Math.PI / 2;
shadow.position.y = -R - 0.01;
scene.add(shadow);

// ── Bubbles ───────────────────────────────────────────────────
const bMat = new THREE.MeshPhysicalMaterial({
  color: 0xeef8ff, transparent: true, opacity: 0.35, roughness: 0, clearcoat: 1
});
const bubbles = [];
for (let i = 0; i < 12; i++) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), bMat);
  m.scale.setScalar(0.012 + Math.random()*0.018);
  const a = Math.random()*Math.PI*2, r = Math.random()*surfR*0.7;
  m.position.set(Math.cos(a)*r, -R + Math.random()*(waterY+R), Math.sin(a)*r);
  m._d = { bx: Math.cos(a)*r, bz: Math.sin(a)*r, spd: 0.15+Math.random()*0.25, ph: Math.random()*Math.PI*2, w: 0.02+Math.random()*0.04 };
  bubbles.push(m);
  scene.add(m);
}

// ── Animate ───────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const t = clock.getElapsedTime();
  waterSurface.material.uniforms.time.value = t;
  for (const b of bubbles) {
    const d = b._d;
    b.position.y += d.spd * 0.007;
    b.position.x = d.bx + Math.sin(t*1.1+d.ph)*d.w;
    b.position.z = d.bz + Math.cos(t*0.9+d.ph)*d.w;
    if (b.position.y > waterY - 0.04) {
      const a = Math.random()*Math.PI*2, r = Math.random()*surfR*0.7;
      d.bx = Math.cos(a)*r; d.bz = Math.sin(a)*r;
      d.ph = Math.random()*Math.PI*2;
      b.position.y = -R + 0.08;
    }
  }
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
